<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background - rounded square like macOS app icon -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#363636"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EE7B4D"/>
      <stop offset="100%" stop-color="#D45A2E"/>
    </linearGradient>
    <linearGradient id="dockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>
  <rect width="200" height="200" rx="40" fill="none" stroke="#4A4A4A" stroke-width="1"/>

  <!-- Dock bar -->
  <rect x="22" y="138" width="156" height="34" rx="10" fill="url(#dockGrad)"/>
  <rect x="22" y="138" width="156" height="34" rx="10" fill="none" stroke="#555" stroke-width="0.5"/>

  <!-- Dock app icons -->
  <rect x="34" y="146" width="18" height="18" rx="5" fill="#E8B030"/>
  <rect x="58" y="146" width="18" height="18" rx="5" fill="#4CAF50"/>
  <rect x="82" y="146" width="18" height="18" rx="5" fill="#EF5350"/>
  <rect x="106" y="146" width="18" height="18" rx="5" fill="#78909C"/>
  <rect x="130" y="146" width="18" height="18" rx="5" fill="#8D6E63"/>
  <rect x="154" y="146" width="18" height="18" rx="5" fill="#A1887F"/>

  <!-- Map pin / location pin - pinning the dock -->
  <path d="M100,26 C74,26 54,46 54,70 C54,96 100,134 100,134 C100,134 146,96 146,70 C146,46 126,26 100,26 Z" fill="url(#pinGrad)"/>

  <!-- Inner circle of pin -->
  <circle cx="100" cy="67" r="20" fill="#2B2B2B"/>
  <circle cx="100" cy="67" r="18" fill="#333"/>

  <!-- Pin dot -->
  <circle cx="100" cy="67" r="6" fill="#EE7B4D"/>

  <!-- Subtle highlight on pin -->
  <ellipse cx="86" cy="52" rx="10" ry="7" fill="rgba(255,255,255,0.12)"/>
</svg>
